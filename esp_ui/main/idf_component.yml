dependencies:
  idf:
    version: ">=6.0.1"

  # LVGL + Espressif port (handles display flush, touch input, PPA acceleration).
  # LVGL is pinned directly because esp_lvgl_port's constraint is
  # "8 <= x < 10" -- without an explicit pin the manager picks the latest
  # 9.x available. Currently held at ~9.4.0: 9.5.0 was tried 2026-05-05 and
  # introduced a hard LVGL-task deadlock reproducible by closing the
  # settings overlay and immediately touching a fader. Revisit when 9.6
  # ships or when an LVGL 9.5 patch addresses it.
  lvgl/lvgl:
    version: "~9.4.0"
  espressif/esp_lvgl_port:
    version: "^2.0.0"

  # MIPI-DSI panel driver. CrowPanel Advanced 10.1" (Elecrow SKU DHE04310D)
  # uses the EK79007 — confirmed against Elecrow's own Arduino lessons
  # (esp_panel_board_custom_conf.h sets ESP_PANEL_BOARD_LCD_CONTROLLER EK79007).
  # 2.x is the IDF v6.0 API alignment line; 1.x macros referenced fields
  # missing on IDF v6 and forced a hand-built dpi_cfg in app_display.c.
  espressif/esp_lcd_ek79007:
    version: "^2.0.0"

  # Capacitive touch controller (GT911) over I2C.
  espressif/esp_lcd_touch_gt911:
    version: "*"

  # WebSocket client (used by app_ms_client_ws.c).
  espressif/esp_websocket_client:
    version: "*"

  # Wi-Fi via the on-board ESP32-C6 co-processor.
  espressif/esp_wifi_remote:
    version: "*"
  espressif/esp_hosted:
    version: "*"

  # cJSON moved out of esp-idf core in v6.0; pull it from the registry.
  espressif/cjson:
    version: "*"
