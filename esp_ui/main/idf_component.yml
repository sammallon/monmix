dependencies:
  idf:
    version: ">=6.0.1"

  # LVGL + Espressif port (handles display flush, touch input, PPA acceleration).
  espressif/esp_lvgl_port:
    version: "^2.0.0"

  # MIPI-DSI panel driver. CrowPanel Advanced 10.1" (Elecrow SKU DHE04310D)
  # uses the EK79007 — confirmed against Elecrow's own Arduino lessons
  # (esp_panel_board_custom_conf.h sets ESP_PANEL_BOARD_LCD_CONTROLLER EK79007).
  espressif/esp_lcd_ek79007:
    version: "*"

  # Capacitive touch controller (GT911) over I2C.
  espressif/esp_lcd_touch_gt911:
    version: "*"

  # WebSocket client (used by app_ms_client_ws.c).
  espressif/esp_websocket_client:
    version: "*"

  # Wi-Fi via the on-board ESP32-C6 co-processor.
  espressif/esp_wifi_remote:
    version: "*"
  espressif/esp_hosted:
    version: "*"

  # cJSON moved out of esp-idf core in v6.0; pull it from the registry.
  espressif/cjson:
    version: "*"
